version: '3.8'

services:
  # --- Database ---
  postgres:
    image: postgres:15-alpine
    container_name: mana-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mana_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # --- Cache & Queues ---
  redis:
    image: redis:7-alpine
    container_name: mana-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # --- Search ---
  meilisearch:
    image: getmeili/meilisearch:latest
    container_name: mana-meilisearch
    restart: always
    environment:
      MEILI_HOST: 0.0.0.0:7700
      MEILI_MASTER_KEY: masterKey
      MEILI_NO_ANALYTICS: "true"
    ports:
      - "7700:7700"
    volumes:
      - meili_data:/meili_data

  # --- Email Testing (Optional) ---
  mailhog:
    image: mailhog/mailhog
    container_name: mana-mailhog
    restart: always
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # Web UI

  # --- Inngest Dev Server ---
  inngest:
    image: inngest/inngest:latest
    container_name: mana-inngest
    restart: always
    ports:
      - "8288:8288"
    command: ["dev", "-u", "http://host.docker.internal:3000/api/inngest"]

volumes:
  postgres_data:
  redis_data:
  meili_data:
